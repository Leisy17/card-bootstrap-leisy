<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Leisy</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"

      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"

  <body>
    <div class="card" style="width: 20rem">
      <div class="card-header">
        <h5 class="card-title">Leisy Sánchez Doria</h5>
      </div>
      <img src="assets/me.jpeg" class="card-img-top" />

      <div class="card-body">
        <p class="card-text">
          Soy una persona curiosa, resiliente y siempre en busca de crecer.
        </p>
      </div>
      <ul class="list-group list-group-flush">
        <li class="list-group-item">Backend & Security Developer</li>
      </ul>
      <div class="card-body">
        <a
          href="https://github.com/Leisy17"
          class="card-link fa-brands fa-github github-icon fa-2x"
        ></a>
        <a
          href="https://www.linkedin.com/in/leisy-sanchez/en/"
          class="card-link fa-brands fa-linkedin fa-2x"
        ></a>
      </div>
    </div>
  </body>
</html>
